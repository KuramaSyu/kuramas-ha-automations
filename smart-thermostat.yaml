blueprint:
  name: Heizungssteuerung (Eco + Fenster + Kalender + Zonen-Logik + Kill Switch)
  description: >
    🧠 ERWEITERTE PRÄSENZLOGIK

    Dieses Blueprint steuert ein Thermostat mit klaren Prioritäten:

    ─────────────────────────────
    🔥 PRIORITÄTEN
    ─────────────────────────────

    1. 🪟 Fenster offen → Heizung AUS
    2. 🔘 Kill Switch → alles blockiert
    3. 📅 Kalender Override → blockiert Eco-Modus
    4. 🔴 Away-Zonen → erzwingen Abwesenheit
    5. 🟢 Presence-Zonen + Distanz → Anwesenheit

    ─────────────────────────────
    🟢 PRESENCE ZONEN
    ─────────────────────────────
    - Wenn Tracker in diesen Zonen ist → gilt als anwesend

    ─────────────────────────────
    🔴 AWAY ZONEN
    ─────────────────────────────
    - Wenn Tracker in diesen Zonen ist → gilt sofort als abwesend
    - Überschreibt Presence-Zonen

  domain: automation

  input:

    tracker:
      name: Tracker (person / device_tracker)
      selector:
        entity:
          domain:
            - person
            - device_tracker

    proximity_sensor:
      name: Distanzsensor (optional)
      default: null
      selector:
        entity:
          domain: sensor

    thermostat:
      name: Thermostat
      selector:
        entity:
          domain: climate

    eco_temperature:
      name: Eco Temperatur
      default: 17
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
          unit_of_measurement: °C

    distance_threshold:
      name: Distanz Schwelle (km)
      default: 1
      selector:
        number:
          min: 0
          max: 100
          step: 0.1

    presence_zones:
      name: Anwesenheits-Zonen (optional)
      description: >
        Zonen, in denen du als ANWESEND giltst (z. B. home, office).
      default: []
      selector:
        entity:
          domain: zone
          multiple: true

    away_zones:
      name: Abwesenheits-Zonen (optional)
      description: >
        Zonen, die dich immer als ABWESEND markieren (override presence).
      default: []
      selector:
        entity:
          domain: zone
          multiple: true

    window_sensors:
      name: Fenster Sensoren
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    kill_switch:
      name: Kill Switch
      selector:
        entity:
          domain: input_boolean

    vacation_calendar:
      name: Kalender
      selector:
        entity:
          domain: calendar

    calendar_keyword:
      name: Kalender Keyword
      default: "automation"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input tracker

  - platform: state
    entity_id: !input vacation_calendar

  - platform: state
    entity_id: !input window_sensors

condition:

  # 🪟 1. Fenster offen → STOP
  - condition: template
    value_template: >
      {% set windows = !input window_sensors %}
      {{ not (windows | select('is_state','on') | list | count > 0) }}

  # 🔘 2. Kill Switch
  - condition: state
    entity_id: !input kill_switch
    state: "off"

  # 📅 3. Kalender Override
  - condition: template
    value_template: >
      {% set cal = !input vacation_calendar %}
      {% set keyword = (!input calendar_keyword | lower).strip() %}
      {% set active = is_state(cal, 'on') %}

      {% set text = (
        state_attr(cal, 'description') | default('') ~ ' ' ~
        state_attr(cal, 'message') | default('')
      ) | lower %}

      {% if keyword == '' %}
        {{ not active }}
      {% else %}
        {{ not (active and keyword in text) }}
      {% endif %}

  # 📍 4. Presence / Away / Distanz Logik
  - condition: template
    value_template: >
      {% set tracker_state = states(!input tracker) %}

      {% set presence_zones = !input presence_zones %}
      {% set away_zones = !input away_zones %}

      {% set presence_names = presence_zones
          | map(attribute='entity_id')
          | map('replace','zone.','')
          | list %}

      {% set away_names = away_zones
          | map(attribute='entity_id')
          | map('replace','zone.','')
          | list %}

      {% set in_presence = tracker_state in presence_names %}
      {% set in_away = tracker_state in away_names %}

      {% set prox = !input proximity_sensor %}

      {% if prox %}
        {% set distance = states(prox) | float(0) %}
        {% set far = distance > (!input distance_threshold) %}
      {% else %}
        {% set far = tracker_state == 'not_home' %}
      {% endif %}

      {{ (in_presence and not in_away) and not far }}

action:
  - service: climate.set_temperature
    target:
      entity_id: !input thermostat
    data:
      temperature: !input eco_temperature

mode: single