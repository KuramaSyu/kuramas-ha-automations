blueprint:
  name: Heizungssteuerung (Eco + Fenster + Kalender + Kill Switch)
  description: >
    🧠 INTELLIGENTE HEIZUNGSLOGIK FÜR HOME ASSISTANT

    Dieses Blueprint steuert ein Thermostat anhand mehrerer Prioritäten:

    ─────────────────────────────
    🔥 PRIORITÄTEN (wichtig)
    ─────────────────────────────

    1. 🪟 FENSTER OFFEN (binary_sensor = on)
       → Heizung wird komplett ausgeschaltet (Sicherheits-Override)

    2. 🔘 KILL SWITCH (input_boolean)
       → deaktiviert die gesamte Automatik

    3. 📅 KALENDER-OVERRIDE
       → nur wenn ein aktiver Termin existiert UND das definierte Keyword
         in Titel oder Beschreibung enthalten ist

    4. 📍 ABWESENHEIT / ZONEN / DISTANZ
       → setzt Eco-Temperatur

    ─────────────────────────────
    📍 ZONEN (WICHTIG)
    ─────────────────────────────

    - Zonen sind Home Assistant zone entities (zone.home, zone.work, ...)
    - Intern wird verglichen mit dem State des Trackers:
        zone.work → "work"
    - Wenn Tracker in einer dieser Zonen ist → wird als "anwesend" gewertet

    ─────────────────────────────
    📏 DISTANZ
    ─────────────────────────────

    - Distanz kommt NICHT aus der Person selbst
    - Muss über einen separaten Sensor kommen (z. B. proximity.home)
    - Wenn nicht gesetzt → fallback auf "not_home"

  domain: automation

  input:

    tracker:
      name: Tracker (person oder device_tracker)
      description: >
        Basis für Standortlogik.
        Liefert State wie: home / not_home / work / gym ...
      selector:
        entity:
          domain:
            - person
            - device_tracker

    proximity_sensor:
      name: Distanzsensor (optional)
      description: >
        Sensor für echte Distanzmessung zur Home-Zone.
        Beispiel: proximity.home_distance.
        Wenn nicht gesetzt → wird nur not_home verwendet.
      default: null
      selector:
        entity:
          domain: sensor

    thermostat:
      name: Thermostat
      selector:
        entity:
          domain: climate

    eco_temperature:
      name: Eco Temperatur
      default: 17
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
          unit_of_measurement: °C

    distance_threshold:
      name: Distanz Schwelle (km)
      default: 1
      selector:
        number:
          min: 0
          max: 100
          step: 0.1

    zones:
      name: Zonen (optional)
      description: >
        Liste von Zonen (zone.*).
        Beispiel: zone.work, zone.gym.
        Wenn Tracker in einer dieser Zonen ist → gilt als anwesend.
      default: []
      selector:
        entity:
          domain: zone
          multiple: true

    window_sensors:
      name: Fenster Sensoren
      description: >
        Wenn EIN Fenster offen ist (on) → Heizung wird komplett ausgeschaltet.
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    kill_switch:
      name: Kill Switch
      description: >
        input_boolean. Wenn ON → Automation ist deaktiviert.
      selector:
        entity:
          domain: input_boolean

    vacation_calendar:
      name: Kalender
      selector:
        entity:
          domain: calendar

    calendar_keyword:
      name: Kalender Keyword
      description: >
        Nur Termine, die dieses Keyword enthalten (Titel oder Beschreibung),
        blockieren die Eco-Heizung.
        Leer lassen = jeder aktive Termin blockiert.
      default: "automation"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input tracker

  - platform: state
    entity_id: !input vacation_calendar

  - platform: state
    entity_id: !input window_sensors

condition:

  # 🪟 1. Fenster offen → sofort STOP
  - condition: template
    value_template: >
      {% set windows = !input window_sensors %}
      {{ not (windows | select('is_state','on') | list | count > 0) }}

  # 🔘 2. Kill Switch
  - condition: state
    entity_id: !input kill_switch
    state: "off"

  # 📅 3. Kalender Override
  - condition: template
    value_template: >
      {% set cal = !input vacation_calendar %}
      {% set keyword = (!input calendar_keyword | lower).strip() %}
      {% set active = is_state(cal, 'on') %}

      {% set text = (
        state_attr(cal, 'description') | default('') ~ ' ' ~
        state_attr(cal, 'message') | default('')
      ) | lower %}

      {% if keyword == '' %}
        {{ not active }}
      {% else %}
        {{ not (active and keyword in text) }}
      {% endif %}

  # 📍 4. Abwesenheit / Zonen / Distanz
  - condition: template
    value_template: >
      {% set tracker_state = states(!input tracker) %}

      {% set zone_entities = !input zones %}
      {% set zone_names = zone_entities
          | map(attribute='entity_id')
          | map('replace','zone.','')
          | list %}

      {% set in_zone = tracker_state in zone_names %}

      {% set prox = !input proximity_sensor %}

      {% if prox %}
        {% set distance = states(prox) | float(0) %}
        {% set far = distance > (!input distance_threshold) %}
      {% else %}
        {% set far = tracker_state == 'not_home' %}
      {% endif %}

      {{ far or in_zone }}

action:
  - service: climate.set_temperature
    target:
      entity_id: !input thermostat
    data:
      temperature: !input eco_temperature

mode: single