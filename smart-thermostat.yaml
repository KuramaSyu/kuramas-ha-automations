blueprint:
  name: Heizungssteuerung (Eco + Fenster + Kalender + Kill Switch)
  description: >
    📌 INTELLIGENTE HEIZUNGSLOGIK

    Dieses Blueprint steuert ein Thermostat basierend auf:
    
    PRIORITÄTEN (wichtig):
    1. 🪟 Fenster offen → Heizung AUS (Sicherheits-Override)
    2. 🔘 Kill-Switch → blockiert jede Automatik
    3. 📅 Kalender-Override → blockiert Eco-Modus (nur bei Keyword)
    4. 📍 Abwesenheit (Distanz ODER Zonen) → Eco-Temperatur

    DISTANZ:
    - Wird NICHT aus der Person berechnet
    - Muss über einen separaten Sensor erfolgen (z. B. proximity)

  domain: automation

  input:

    tracker:
      name: Tracker (person oder device_tracker)
      description: Basis für Zonenstatus (home / not_home / zone)
      selector:
        entity:
          domain:
            - person
            - device_tracker

    proximity_sensor:
      name: Distanzsensor (proximity / distance_to_home)
      description: >
        Optional. Wird verwendet für echte Distanzmessung zur Home-Zone.
        Falls nicht gesetzt → fallback auf not_home Logik.
      default: null
      selector:
        entity:
          domain: sensor

    thermostat:
      name: Thermostat
      selector:
        entity:
          domain: climate

    eco_temperature:
      name: Eco Temperatur
      default: 17
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
          unit_of_measurement: °C

    distance_threshold:
      name: Distanz Schwelle (km)
      default: 1
      selector:
        number:
          min: 0
          max: 100
          step: 0.1

    zones:
      name: Zonen (optional)
      default: []
      selector:
        entity:
          domain: zone
          multiple: true

    window_sensors:
      name: Fenster Sensoren
      description: >
        Wenn EIN Fenster offen ist → Heizung wird komplett ausgeschaltet.
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    kill_switch:
      name: Kill Switch
      description: >
        Wenn aktiviert → Automation ist komplett deaktiviert.
      selector:
        entity:
          domain: input_boolean

    vacation_calendar:
      name: Kalender
      selector:
        entity:
          domain: calendar

    calendar_keyword:
      name: Kalender Keyword
      description: >
        Nur Termine mit diesem Keyword (in Titel oder Beschreibung)
        blockieren die Eco-Heizung.
        Leer lassen = jeder aktive Termin blockiert.
      default: "automation"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input tracker

  - platform: state
    entity_id: !input vacation_calendar

  - platform: state
    entity_id: !input window_sensors

condition:

  # 🪟 1. Fenster OFFEN → sofort STOP (höchste Priorität)
  - condition: template
    value_template: >
      {% set windows = !input window_sensors %}
      {{ not (windows | select('is_state','on') | list | count > 0) }}

  # 🔘 2. Kill Switch
  - condition: state
    entity_id: !input kill_switch
    state: "off"

  # 📅 3. Kalender-Override (nur wenn Keyword passt)
  - condition: template
    value_template: >
      {% set cal = !input vacation_calendar %}
      {% set keyword = (!input calendar_keyword | lower).strip() %}
      {% set active = is_state(cal, 'on') %}

      {% set text = (
        state_attr(cal, 'description') | default('') ~ ' ' ~
        state_attr(cal, 'message') | default('')
      ) | lower %}

      {% if keyword == '' %}
        {{ not active }}
      {% else %}
        {{ not (active and keyword in text) }}
      {% endif %}

  # 📍 4. Abwesenheit / Zonen / Distanz
  - condition: template
    value_template: >
      {% set tracker_state = states(!input tracker) %}

      {% set zone_entities = !input zones %}
      {% set zone_names = zone_entities
          | map(attribute='entity_id')
          | map('replace','zone.','')
          | list %}

      {% set in_zone = tracker_state in zone_names %}

      {% set prox = !input proximity_sensor %}

      {% if prox %}
        {% set distance = states(prox) | float(0) %}
        {% set far = distance > (!input distance_threshold) %}
      {% else %}
        {% set far = tracker_state == 'not_home' %}
      {% endif %}

      {{ far or in_zone }}

action:
  - service: climate.set_temperature
    target:
      entity_id: !input thermostat
    data:
      temperature: !input eco_temperature

mode: single