blueprint:
  name: Smart Light Alarmclock
  description: >
    A wake-up light alarm with a brightness and color temperature sunrise effect.
    Note: Requires date_time_iso sensor in configuration, not manually executable!
  domain: automation
  input:
    light_entity:
      name: Wake-up light entity
      description: >
        The light to control. Turning it off during the sunrise will keep it off.
        Color temperature range is auto-detected.
      selector:
        entity:
          domain: light

    timestamp_sensor:
      name: Alarm timestamp sensor
      description: >
        Sensor with timestamp of next alarm with device_class: timestamp
        (set to 'none' for manual alarm time)
      default: none
      selector:
        entity:
          device_class: timestamp

    manual_time:
      name: Manual alarm time
      description: >
        Time to trigger alarm every day if timestamp sensor is not set.
        Leave empty when using a timestamp sensor to avoid ambiguity.
        Settings at or shortly after midnight will not work as expected!
      default: ""
      selector:
        time: {}

    check_entity:
      name: Additional entity to check before sunrise is triggered
      description: >
        If set, checks if entity is 'on' or 'home' before triggering. Use
        e.g. a (workday) sensor, device_tracker or person entity.
      default: none
      selector:
        entity: {}

    kill_switch_entity:
      name: Automation kill switch
      description: >
        Optional helper that can be used to disable the automation. If the state of this entity is 'on', the automation will not run.
      default: none
      selector:
        entity: {}

    last_run_entity:
      name: Last run timestamp helper
      description: >
        Optional datetime helper (input_datetime) to store the last successful run time.
        This is used to prevent the automation from running again within the cooldown period.
      default: none
      selector:
        entity:
          domain: input_datetime

    cooldown_duration:
      name: Cooldown duration (hours)
      description: >
        The minimum time in hours that must pass before the automation can run again.
      default: 2
      selector:
        number:
          min: 0.5
          max: 24.0
          step: 0.5
          unit_of_measurement: h
          mode: slider

    sunrise_duration:
      name: Sunrise duration
      description: The sunrise will start the configured number of minutes before the timestamp.
      default: 25
      selector:
        number:
          min: 5.0
          max: 60.0
          step: 5.0
          unit_of_measurement: min
          mode: slider

    start_brightness:
      name: Minimum brightness
      description: >
        The brightness to start with. Some lights ignore very low values
        and may turn on with full brightness instead!
      default: 1
      selector:
        number:
          min: 1.0
          max: 255.0
          step: 1.0
          mode: slider

    end_brightness:
      name: Maximum brightness
      description: The brightness will be transitioned from the minimum to the configured value.
      default: 254
      selector:
        number:
          min: 5.0
          max: 255.0
          step: 1.0
          mode: slider

    min_kelvin:
      name: Minimum color temperature (Kelvin)
      description: >
        Color temperature in Kelvin (K). Lower K = warmer/more orange (e.g. ~2000K),
        higher K = cooler/more white/blue (e.g. ~6500K).

        This value controls the *warmest* point of the sunrise. Typically you'd start warm
        (default: 2000K) and ramp towards a cooler white near wake-up.

        Set to 0 to use the light's minimum supported Kelvin automatically (recommended if you
        don't want to tune it).
      default: 2000
      selector:
        number:
          min: 0.0
          max: 10000.0
          step: 100.0
          mode: slider
          unit_of_measurement: K

    max_kelvin:
      name: Maximum color temperature (Kelvin)
      description: >
        Color temperature in Kelvin (K). Lower K = warmer/more orange, higher K = cooler/more white/blue.

        This value controls the *coolest* point of the sunrise (around your alarm time). What you pick
        depends on personal preference:
          - ~3000K: still warm/relaxing
          - ~4000K: neutral white (common indoor daytime)
          - ~5000-6500K: daylight/cool white (very bright/alerting)

        Normally this is set to a neutral/daylight white (default: 4000K). Set to 0 to use the light's
        maximum supported Kelvin automatically.
      default: 4000
      selector:
        number:
          min: 0.0
          max: 10000.0
          step: 100.0
          mode: slider
          unit_of_measurement: K

    color_temp_curve:
      name: Color temperature curve (how fast it gets cooler)
      description: >
        Controls how quickly the light transitions from warm (min Kelvin) to cool (max Kelvin)
        during the sunrise window.

        All curves still start at min Kelvin at the beginning and end at max Kelvin at the alarm time,
        but they change *when* most of the cooling happens:

          - linear (default): steady change throughout (simple + predictable)
          - ease_in: changes slowly at first, then cools faster near the end
          - ease_out: cools quickly at the start, then changes slowly near the end
          - ease_in_out: slow at start and end, faster in the middle (often feels natural)
          - step_end: stays warm most of the time, then switches/cools rapidly near the end

        Which one is best depends on you:
          - If you want to stay cozy/warm and only get “daylight” close to wake-up: use ease_in or step_end
          - If you want to feel alert early in the ramp: use ease_out
          - If you want something balanced: use ease_in_out
      default: linear
      selector:
        select:
          options:
            - label: "Linear"
              value: linear
            - label: "Ease-in (slow → fast)"
              value: ease_in
            - label: "Ease-out (fast → slow)"
              value: ease_out
            - label: "Ease-in-out (slow → fast → slow)"
              value: ease_in_out
            - label: "Step near end (mostly warm, cool at end)"
              value: step_end
          mode: dropdown

    step_end_percent:
      name: "Step curve: warm portion (%)"
      description: >
        Only used when Color temperature curve is "Step near end".
        The light will stay at the warmest temperature for this percentage of the sunrise duration,
        then transition to the coolest temperature during the remaining time.

        Example: 80% means "stay warm for 80% of the ramp, then cool during the last 20%".
      default: 80
      selector:
        number:
          min: 50.0
          max: 95.0
          step: 5.0
          unit_of_measurement: "%"
          mode: slider

    start_time:
      name: Start time (optional)
      description: Optional start time for the time window in which the automation can trigger.
      default: ""
      selector:
        time: {}

    end_time:
      name: End time (optional)
      description: Optional end time for the time window in which the automation can trigger.
      default: ""
      selector:
        time: {}

    pre_sunrise_actions:
      name: Pre-sunrise actions
      description: Optional actions to run before sunrise starts.
      default: []
      selector:
        action: {}

    post_sunrise_actions:
      name: Post-sunrise actions
      description: Optional actions to run after sunrise ends (around the alarm time).
      default: []
      selector:
        action: {}

  source_url: https://github.com/KuramaSyu/kuramas-ha-automations/blob/main/light-alarmclock.yaml

variables:
  light_entity: !input "light_entity"
  sensor: !input "timestamp_sensor"
  sunrise_duration: !input "sunrise_duration"
  start_brightness: !input "start_brightness"
  end_brightness: !input "end_brightness"
  range_brightness: "{{ float(end_brightness) - float(start_brightness) }}"
  manual_time: !input "manual_time"
  seconds: "{{ float(sunrise_duration) * 60 }}"
  tick_time: "{{ float(seconds) / float(range_brightness) }}"
  check_entity: !input "check_entity"
  kill_switch_entity: !input "kill_switch_entity"
  last_run_entity: !input "last_run_entity"
  cooldown_duration: !input "cooldown_duration"

  start_time: !input "start_time"
  end_time: !input "end_time"
  start_t: "{{ strptime(start_time, '%H:%M:%S').time() if start_time else None }}"
  end_t: "{{ strptime(end_time, '%H:%M:%S').time() if end_time else None }}"
  now_t: "{{ now().time() }}"

  supports_color_temp: "{{ 'color_temp' in (state_attr(light_entity, 'supported_color_modes') or []) }}"

  light_min_kelvin: "{{ state_attr(light_entity, 'min_color_temp_kelvin') | int(2000) }}"
  light_max_kelvin: "{{ state_attr(light_entity, 'max_color_temp_kelvin') | int(6500) }}"

  min_kelvin_input: !input "min_kelvin"
  max_kelvin_input: !input "max_kelvin"

  start_kelvin: >
    {{ (min_kelvin_input | int(0)) if (min_kelvin_input | int(0)) > 0 else light_min_kelvin }}
  end_kelvin: >
    {{ (max_kelvin_input | int(0)) if (max_kelvin_input | int(0)) > 0 else light_max_kelvin }}

  kelvin_low: "{{ [start_kelvin | int, end_kelvin | int] | min }}"
  kelvin_high: "{{ [start_kelvin | int, end_kelvin | int] | max }}"
  start_kelvin_norm: "{{ kelvin_low | int }}"
  end_kelvin_norm: "{{ kelvin_high | int }}"

  color_temp_curve: !input "color_temp_curve"
  step_end_percent: !input "step_end_percent"

  alarm_ts: >
    {% if sensor != 'none' %}
      {{ as_timestamp(states(sensor)) }}
    {% elif manual_time %}
      {{ as_timestamp(states('sensor.date') ~ ' ' ~ manual_time) }}
    {% else %}
      0
    {% endif %}

# JINJA MACROS (documentation) ...
# (unchanged macros omitted here for brevity in the display)

trigger:
  - platform: time_pattern
    minutes: "*"

condition:
  - condition: template
    value_template: >
      {% macro time_in_window(start, end, now) -%}
        {%- if start is none and end is none -%}
          True
        {%- elif start is not none and end is none -%}
          {{ now >= start }}
        {%- elif start is none and end is not none -%}
          {{ now <= end }}
        {%- else -%}
          {%- if start < end -%}
            {{ (start <= now <= end) }}
          {%- else -%}
            {{ (now >= start) or (now <= end) }}
          {%- endif -%}
        {%- endif -%}
      {%- endmacro %}

      {{ time_in_window(start_t, end_t, now_t) }}
  - condition: template
    value_template: >
      {{ kill_switch_entity == 'none' or states(kill_switch_entity) != 'on' }}
  - condition: template
    value_template: >
      {{ last_run_entity == 'none' or
         as_timestamp(now()) - as_timestamp(states(last_run_entity), 0) > cooldown_duration * 3600 }}
  - condition: template
    value_template: >
      {{ not (sensor != 'none' and manual_time != '') }}

  # Immediate check: only continue if alarm is within the configured sunrise_duration window,
  # the timestamp (or manual time) is valid, and the optional check_entity is in an acceptable state.
  - condition: template
    value_template: >
      {% macro sensor_valid_ts(entity) -%}
        {%- if entity == 'none' -%}
          true
        {%- else -%}
          {%- set s = states(entity) -%}
          {{ (s not in [None, '', 'unknown', 'unavailable']) and (as_timestamp(s, None) != None) }}
        {%- endif -%}
      {%- endmacro %}

      {% macro alarm_within_threshold() -%}
        {%- set threshold = (start_wait_threshold | default(seconds) | float) -%}
        {%- set diff = (alarm_ts | float) - as_timestamp(now()) -%}
        {{ (diff > 0) and (diff <= threshold) }}
      {%- endmacro %}

      {{ sensor_valid_ts(sensor) and alarm_within_threshold() and (check_entity == 'none' or states(check_entity) in ['unknown', 'on', 'home']) }}
action:
  # Debug notification: sends the computed values used by the template to help troubleshoot mismatches.
  - service: persistent_notification.create
    data:
      title: "Light alarmclock — debug values"
      message: >
        alarm_ts: {{ alarm_ts }}
        now_timestamp: {{ as_timestamp(now()) }}
        diff (alarm_ts - now): {{ (alarm_ts | float) - as_timestamp(now()) }}
        seconds (sunrise window): {{ seconds }}
        sensor entity id: {{ sensor }}
        sensor state: {{ states(sensor) }}
        sensor_valid_ts: {{ (sensor == 'none') or ((states(sensor) not in [None, '', 'unknown', 'unavailable']) and (as_timestamp(states(sensor), None) != None)) }}
        alarm_within_seconds (diff > 0 and diff <= seconds): {{ ((alarm_ts | float) - as_timestamp(now())) > 0 and ((alarm_ts | float) - as_timestamp(now())) <= (seconds | float) }}
        check_entity: {{ check_entity }}
        check_entity_state: {{ states(check_entity) }}
        supports_color_temp: {{ supports_color_temp }}

  # pre-sunrise actions run only if above conditions passed (i.e. alarm is in timeframe)
  - choose: []
    default: !input "pre_sunrise_actions"

  # Re-added initial light.turn_on before the repeat loop — will set start brightness and color temperature (if supported).
  - choose:
      - conditions:
          - "{{ supports_color_temp }}"
        sequence:
          - service: light.turn_on
            data:
              brightness: "{{ start_brightness | int }}"
              color_temp_kelvin: "{{ start_kelvin_norm | int }}"
            entity_id: !input "light_entity"
    default:
      - service: light.turn_on
        data:
          brightness: "{{ start_brightness | int }}"
        entity_id: !input "light_entity"

  # The repeat loop below performs the ramping behavior during the timeframe.
  - repeat:
      while:
        - >
            {% macro sensor_valid_ts(entity) -%}
              {%- if entity == 'none' -%}
                true
              {%- else -%}
                {%- set s = states(entity) -%}
                {{ (s not in [None, '', 'unknown', 'unavailable']) and (as_timestamp(s, None) != None) }}
              {%- endif -%}
            {%- endmacro %}

            {{ sensor_valid_ts(sensor) }}
        - >
            {% macro alarm_within(threshold) -%}
              {%- set diff = (alarm_ts | float) - as_timestamp(now()) -%}
              {{ (diff > 0) and (diff <= (threshold | float)) }}
            {%- endmacro %}

            {{ alarm_within(seconds) }}
      sequence:
        - delay: "{{ tick_time }}"

        - choose:
            - conditions:
                - "{{ 0 < (state_attr(light_entity, 'brightness') | int(0)) < (end_brightness | int) }}"
                - >
                    {% macro sensor_valid_ts(entity) -%}
                      {%- if entity == 'none' -%}
                        true
                      {%- else -%}
                        {%- set s = states(entity) -%}
                        {{ (s not in [None, '', 'unknown', 'unavailable']) and (as_timestamp(s, None) != None) }}
                      {%- endif -%}
                    {%- endmacro %}

                    {{ sensor_valid_ts(sensor) }}
                - >
                    {% macro alarm_within(threshold) -%}
                      {%- set diff = (alarm_ts | float) - as_timestamp(now()) -%}
                      {{ (diff > 0) and (diff <= (threshold | float)) }}
                    {%- endmacro %}

                    {{ alarm_within(seconds) }}
              sequence:
                - choose:
                    - conditions:
                        - "{{ supports_color_temp }}"
                      sequence:
                        - service: light.turn_on
                          data:
                            brightness: >
                              {{ ( float(end_brightness)
                                  - ( float(range_brightness)
                                      * ((alarm_ts - as_timestamp(now())) / float(seconds))
                                    )
                                ) | int(0) }}

                            # Compute curve progress p in [0..1], where:
                            # p=0 at start of sunrise window (now far from alarm)
                            # p=1 at alarm time
                            #
                            # We first compute remaining fraction r in [0..1], then p = 1-r
                            # r = (alarm_ts - now) / seconds
                            # p = 1 - r
                            color_temp_kelvin: >
                              {% set r = ((alarm_ts - as_timestamp(now())) / float(seconds)) %}
                              {% set r = [0, [r, 1] | min] | max %}
                              {% set p = 1 - r %}

                              {# Choose curve-mapped progress q in [0..1] #}
                              {% if color_temp_curve == 'linear' %}
                                {% set q = p %}
                              {% elif color_temp_curve == 'ease_in' %}
                                {# slow -> fast #}
                                {% set q = p ** 2 %}
                              {% elif color_temp_curve == 'ease_out' %}
                                {# fast -> slow #}
                                {% set q = 1 - ((1 - p) ** 2) %}
                              {% elif color_temp_curve == 'ease_in_out' %}
                                {# smoothstep: 3p^2 - 2p^3 #}
                                {% set q = (3 * (p ** 2)) - (2 * (p ** 3)) %}
                              {% elif color_temp_curve == 'step_end' %}
                                {% set warm_portion = (step_end_percent | float(80)) / 100 %}
                                {% if p <= warm_portion %}
                                  {% set q = 0 %}
                                {% else %}
                                  {% set denom = (1 - warm_portion) %}
                                  {% set q = (p - warm_portion) / (denom if denom > 0 else 1) %}
                                {% endif %}
                              {% else %}
                                {% set q = p %}
                              {% endif %}

                              {# Map q onto Kelvin range (warm->cool) #}
                              {{ ( (start_kelvin_norm | float)
                                   + ((end_kelvin_norm | float) - (start_kelvin_norm | float)) * q
                                 ) | int(0) }}
                          entity_id: !input "light_entity"
                  default:
                    - service: light.turn_on
                      data:
                        brightness: >
                          {{ ( float(end_brightness)
                              - ( float(range_brightness)
                                  * ((alarm_ts - as_timestamp(now())) / float(seconds))
                                )
                            ) | int(0) }}
                      entity_id: !input "light_entity"

  - choose: []
    default: !input "post_sunrise_actions"

  - choose:
      - conditions:
          - "{{ last_run_entity != 'none' }}"
        sequence:
          - service: input_datetime.set_datetime
            target:
              entity_id: !input last_run_entity
            data:
              datetime: "{{ now().isoformat() }}"

mode: single
max_exceeded: silent